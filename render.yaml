services:
  - type: web
    name: skirk-api
    runtime: docker
    rootDir: api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USD_VALUE
        value: "3694"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: PEPPER
        generateValue: true
      - key: RUNTIME_CONFIG_PATH
        value: /var/data/runtime-config.json
      - key: ZONES_CONFIG_PATH
        value: /var/data/exploration-zones.json
      - key: SERVICES_CONFIG_PATH
        value: /var/data/services.json
      - key: DATABASE_URL
        fromDatabase:
          name: skirk-database
          property: connectionString
      - key: DISBOT_BASE_URL
        sync: false
      - key: DISBOT_SHARED_SECRET
        sync: false
      - key: DISBOT_TIMEOUT_MS
        value: "6000"
    disk:
      name: skirk-api-disk
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: skirk-frontend
    runtime: docker
    rootDir: frontend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: BOOT_WAKEUP_URL
        sync: false
      - key: BOOT_WAKEUP_DISBOT_URL
        sync: false

  - type: web
    name: skirk-disbot
    runtime: docker
    rootDir: DisBot
    healthCheckPath: /health
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: USER_ID
        sync: false
      - key: DISBOT_PORT
        value: "5000"
      - key: API_SHARED_SECRET
        sync: false

databases:
  - name: skirk-database
    plan: free
    databaseName: skirk_boost
    user: postgres
