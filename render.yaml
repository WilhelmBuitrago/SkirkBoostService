services:
  - type: web
    name: skirk-api
    runtime: docker
    rootDir: api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USD_VALUE
        value: "2857"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: PEPPER
        generateValue: true
      - key: RUNTIME_CONFIG_PATH
        value: /var/data/runtime-config.json
      - key: ZONES_CONFIG_PATH
        value: /var/data/exploration-zones.json
      - key: SERVICES_CONFIG_PATH
        value: /var/data/services.json
      - key: DATABASE_URL
        fromDatabase:
          name: skirk-database
          property: connectionString
    disk:
      name: skirk-api-disk
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: skirk-frontend
    runtime: docker
    rootDir: frontend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USD_VALUE
        value: "2857"
      - key: API_BASE_URL
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false

databases:
  - name: skirk-database
    plan: free
    databaseName: skirk_boost
    user: postgres
